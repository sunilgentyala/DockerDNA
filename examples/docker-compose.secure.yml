# Example: Hardened docker-compose following CIS Docker Benchmark v1.6

version: "3.9"

services:
  webapp:
    image: myapp:1.2.3@sha256:abc123def456
    read_only: true
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - NODE_ENV=production
    secrets:
      - db_password
      - api_key
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    tmpfs:
      - /tmp
    networks:
      - app-net

  database:
    image: postgres:15-alpine@sha256:def789abc012
    read_only: true
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
    cap_drop:
      - ALL
    secrets:
      - db_password
    environment:
      POSTGRES_USER: appuser
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    networks:
      - app-net
    tmpfs:
      - /tmp
      - /run/postgresql

secrets:
  db_password:
    external: true
  api_key:
    external: true

networks:
  app-net:
    driver: bridge
