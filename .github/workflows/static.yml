name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Tree
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Environment Node
        uses: actions/configure-pages@v4

      # We isolate the builder by copying ONLY index.html into a fresh, empty deployment target folder
      - name: Stage Web Production Artifact
        run: |
          mkdir public
          cp index.html public/

      - name: Upload Static Web Production Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Target only the clean public folder containing your standalone page
          path: 'public'

      - name: Deploy to GitHub Pages Edge
        id: deployment
        uses: actions/deploy-pages@v4
