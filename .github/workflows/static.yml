name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Tree
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Environment Node
        uses: actions/configure-pages@v4

      - name: Upload Static Web Production Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          # Explicitly exclude local python runtimes and cache configurations
          exclude: |
            .git
            .github
            dockerdna/
            tests/
            examples/
            .venv/
            __pycache__/
            *.pyc

      - name: Deploy to GitHub Pages Edge
        id: deployment
        uses: actions/deploy-pages@v4
