name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Tree
        uses: actions/checkout@v4

     # Clean out backend environments dynamically to minimize the bundle surface
      - name: Purge Heavy Python Workspaces
        run: |
          rm -rf dockerdna/ tests/ examples/ docs/
          rm -f pyproject.toml LICENSE README.md
          rm -rf .github/
          rm -f .gitignore
        run: |
          rm -rf dockerdna/ tests/ examples/ docs/ .github/
          rm -f pyproject.toml LICENSE README.md .gitignore

      - name: Upload Static Web Production Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages Edge
        id: deployment
        uses: actions/deploy-pages@v4
